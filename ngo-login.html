<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Login | Share & Serve</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">share&<span>serve</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="donate.html">Donate Food</a>
            <a href="find-donations.html">Find Donations</a>
            <a href="about.html">About</a>
        </nav>
        <div class="nav-buttons">
            <a href="ngo-login.html" class="login">NGO Login</a>
            <a href="donate.html" class="btn-primary">Donate Now</a>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-card" aria-labelledby="ngo-login-title">
            <div class="auth-brand">
                <div class="auth-brand-icon" aria-hidden="true">
                    <i class="fa-solid fa-hand-holding-heart"></i>
                </div>
                <div class="auth-brand-copy">
                    <h2 id="ngo-login-title">NGO Partner Login</h2>
                    <p>Sign in to manage food claims, pickups, and volunteer coordination.</p>
                </div>
            </div>

            <p class="subtitle">Use your registered NGO email or username to continue.</p>

           
                <div class="form-group">
                    <label for="identifier">Email or Username</label>
                    <input
                        id="identifier"
                        name="identifier"
                        type="text"
                        placeholder="Enter your email or username"
                        autocomplete="username"
                        required
                    >
                
                    <p class="field-error" id="identifier-error" aria-live="polite"></p>
                </div>

                <div class="form-group auth-spaced-group">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <p class="field-error" id="password-error" aria-live="polite"></p>
                </div>

               
                <div class="auth-row">
                    <label class="checkbox-row" for="rememberMe">
                        <input id="rememberMe" name="rememberMe" type="checkbox">
                        <span>Remember Me</span>
                    </label>
                    <a class="text-link" href="#" id="forgot-password-link">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn auth-submit" id="login-button">Login</button>
                <p class="auth-feedback" id="auth-feedback" aria-live="polite"></p>
            </form>

        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
